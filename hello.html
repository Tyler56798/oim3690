<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello &middot; Tyler Hummel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* 60/30/10 palette
           60% â€” warm off-white background (#f7f5f0)
           30% â€” deep navy text & secondary surfaces (#1f2d3d)
           10% â€” warm amber accent (#c47b2e)
        */
        :root {
            --bg: #f7f5f0;
            --ink: #1f2d3d;
            --accent: #c47b2e;
            --muted: #6b7480;
            --line: #e3ddd2;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 400;
            background-color: var(--bg);
            color: var(--ink);
            line-height: 1.65;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 60px 28px 80px;
        }

        nav {
            margin-bottom: 32px;
            font-size: 0.9em;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s ease;
        }

        nav a:hover {
            color: var(--accent);
        }

        header {
            border-bottom: 1px solid var(--line);
            padding-bottom: 28px;
            margin-bottom: 40px;
        }

        h1, h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.01em;
        }

        h1 {
            font-size: 3em;
            margin: 0 0 6px 0;
            line-height: 1.1;
        }

        h2 {
            font-size: 1.6em;
            margin: 44px 0 14px 0;
            position: relative;
            padding-left: 16px;
        }

        h2::before {
            content: "";
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 4px;
            background-color: var(--accent);
            border-radius: 2px;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            color: var(--muted);
            font-size: 1.15em;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            margin: 0;
        }

        p {
            margin: 0 0 14px 0;
        }

        .figure {
            margin: 32px 0 8px 0;
        }

        .figure img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid var(--line);
            box-shadow: 0 6px 18px rgba(31, 45, 61, 0.08);
        }

        .caption {
            margin-top: 10px;
            font-size: 0.88em;
            color: var(--muted);
            font-style: italic;
            text-align: center;
        }

        footer {
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.88em;
            text-align: center;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html">&larr; Back to home</a>
        </nav>

        <header>
            <h1>Hello</h1>
            <p class="subtitle">My first hand-written page</p>
        </header>

        <section>
            <p>
                Hi &mdash; my name is <strong>Tyler Hummel</strong>, and this is the first
                HTML page I've written by hand. It's a small milestone, but a real one:
                every line on this page was typed out instead of dragged in from a builder.
            </p>

            <figure class="figure">
                <img src="images/1687278622482.jpg" alt="A test image">
                <figcaption class="caption">A test image</figcaption>
            </figure>
        </section>

        <footer>
            &copy; 2026 Tyler Hummel
        </footer>
    </div>
</body>
</html>
