<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Responsive: tells the phone to use its real width instead of pretending to be ~980px -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact · OIM3690</title>

  <style>
    /* ---- base / mobile-first ---- */
    :root {
      --accent: #b8860b;      /* Babson-ish amber */
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --focus: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 1.5rem 1rem;
    }

    .card {
      background: var(--card);
      max-width: 640px;          /* flexible, but never grows forever on a big screen */
      margin: 0 auto;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    h1 { margin-top: 0; font-size: 1.6rem; }
    p.intro { color: var(--muted); margin-bottom: 1.5rem; }

    fieldset {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 0 0 1.25rem;
      padding: 1rem;
    }
    legend {
      font-weight: 600;
      padding: 0 .4rem;
      color: var(--accent);
    }

    label {
      display: block;
      font-weight: 600;
      margin: .75rem 0 .25rem;
    }
    .hint { font-weight: 400; color: var(--muted); font-size: .85rem; }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"],
    input[type="url"],
    input[type="number"],
    input[type="date"],
    input[type="time"],
    select,
    textarea {
      width: 100%;             /* 100% of the parent, not the whole page */
      padding: .6rem .7rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
    }

    textarea { resize: vertical; min-height: 110px; }

    /* visible focus state so people can see where they are typing */
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
    }

    .choice {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-weight: 400;
      margin: .35rem 0;
    }
    .choice input { width: auto; }
    .choice label { display: inline; margin: 0; font-weight: 400; }

    /* range slider + color picker (input types not covered in class) */
    input[type="range"] { width: 100%; }
    input[type="color"] {
      width: 64px;
      height: 40px;
      padding: 2px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }
    output { font-weight: 600; color: var(--accent); margin-left: .5rem; }

    .row { display: flex; flex-direction: column; gap: 0; }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: .75rem 1.25rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
    button:hover { filter: brightness(1.05); }
    button:focus { outline: 3px solid rgba(37,99,235,.4); outline-offset: 2px; }

    /* ---- wider screens: lay two short fields side by side ---- */
    @media (min-width: 560px) {
      .row { flex-direction: row; gap: 1rem; }
      .row > div { flex: 1; }
      button { width: auto; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Contact Me</h1>
    <p class="intro">
      A practice form for OIM3690. It submits to the class echo endpoint, which
      shows you exactly what was sent. Try switching the method between POST and GET.
    </p>

    <!--
      action = where the data goes (the endpoint)
      method = how it is sent. POST puts data in the request body (hidden from the URL).
               Change method="post" to method="get" to watch the data appear in the URL.
    -->
    <form action="https://oim.zhili.dev/echo/view" method="post">

      <fieldset>
        <legend>Your Info</legend>

        <div class="row">
          <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Tyler Hummel" required>
          </div>
          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="phone">Phone <span class="hint">(optional)</span></label>
            <input type="tel" id="phone" name="phone" placeholder="555-123-4567">
          </div>
          <div>
            <label for="website">Website <span class="hint">(optional)</span></label>
            <input type="url" id="website" name="website" placeholder="https://...">
          </div>
        </div>

        <label for="password">Password <span class="hint">(masked on screen — not the same as secure)</span></label>
        <input type="password" id="password" name="password" minlength="6" autocomplete="off">
      </fieldset>

      <fieldset>
        <legend>Message Details</legend>

        <div class="row">
          <div>
            <label for="topic">Topic</label>
            <select id="topic" name="topic">
              <option value="">Choose one…</option>
              <option value="general">General question</option>
              <option value="project">Project feedback</option>
              <option value="bug">Report a bug</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label for="guests">How many people? <span class="hint">(1–10)</span></label>
            <input type="number" id="guests" name="guests" min="1" max="10" value="1">
          </div>
        </div>

        <label for="preferred-date">Preferred contact date</label>
        <input type="date" id="preferred-date" name="preferred-date">

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Type your message…" required></textarea>
      </fieldset>

      <fieldset>
        <legend>Preferences</legend>

        <span id="contact-method-label" style="font-weight:600;">Preferred way to reach you</span>
        <div role="radiogroup" aria-labelledby="contact-method-label">
          <!-- same name = only one can be chosen -->
          <div class="choice">
            <input type="radio" id="by-email" name="contact-method" value="email" checked>
            <label for="by-email">Email</label>
          </div>
          <div class="choice">
            <input type="radio" id="by-phone" name="contact-method" value="phone">
            <label for="by-phone">Phone</label>
          </div>
          <div class="choice">
            <input type="radio" id="by-text" name="contact-method" value="text">
            <label for="by-text">Text message</label>
          </div>
        </div>

        <div class="choice" style="margin-top:.75rem;">
          <input type="checkbox" id="newsletter" name="newsletter" value="yes">
          <label for="newsletter">Sign me up for the newsletter</label>
        </div>

        <div class="choice">
          <input type="checkbox" id="agree" name="agree" value="yes" required aria-required="true">
          <label for="agree">I agree to be contacted (required)</label>
        </div>
      </fieldset>

      <!-- Practice with input types we did NOT cover in class: range, color, time -->
      <fieldset>
        <legend>Just for Practice</legend>
        <p class="hint" style="margin-top:0;">Input types we did not cover in class.</p>

        <label for="urgency">How urgent is this? <span class="hint">(1 = whenever, 10 = ASAP)</span></label>
        <input type="range" id="urgency" name="urgency" min="1" max="10" value="5"
               oninput="document.getElementById('urgency-out').value = this.value">
        <output id="urgency-out" for="urgency">5</output>

        <label for="fav-color">Favorite color</label>
        <input type="color" id="fav-color" name="fav-color" value="#b8860b">

        <label for="best-time">Best time to reach you</label>
        <input type="time" id="best-time" name="best-time">
      </fieldset>

      <button type="submit">Send Message</button>
    </form>
  </main>
</body>
</html>
