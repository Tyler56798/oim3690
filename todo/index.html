<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 40px auto;
        padding: 0 15px;
      }
      h1 {
        text-align: center;
      }
      form {
        display: flex;
        gap: 8px;
        margin-bottom: 15px;
      }
      #taskInput {
        flex: 1;
        padding: 8px;
        max-width: 100%;
      }
      button {
        padding: 8px 12px;
        cursor: pointer;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-bottom: 1px solid #ddd;
      }
      li.done span {
        text-decoration: line-through;
        color: #888;
      }
      .task-text {
        flex: 1;
      }
      .filters {
        margin: 15px 0;
        display: flex;
        gap: 8px;
      }
      .filters button.active {
        font-weight: bold;
      }
      #count {
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>My To-Do List</h1>

    <form id="taskForm">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button type="submit">Add</button>
    </form>

    <div class="filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="completed">Completed</button>
    </div>

    <ul id="taskList"></ul>

    <p id="count"></p>

    <script src="script.js"></script>
  </body>
</html>
